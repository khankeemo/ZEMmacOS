# Render Deployment Configuration
# Website: https://render.com

services:
  - type: web
    name: zem-license-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME  # Change this to your repo
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: USE_SQLITE_DEV
        value: "0"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: SIGNING_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD_SALT
        generateValue: true
      - key: DEFAULT_ADMIN_USER
        value: "admin"
      - key: DEFAULT_ADMIN_PASSWORD
        value: "ChangeMe123!"
      - key: CORS_ORIGINS
        value: "https://www.websmithdigital.com,https://websmithdigital.com"
      - key: TRIAL_DAYS
        value: "7"
      - key: OFFLINE_GRACE_HOURS
        value: "72"
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"