name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

jobs:
  # ===== WINDOWS BUILD =====
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify clean config
        run: |
          $config = Get-Content config/config.json | ConvertFrom-Json
          if ($config.license_key -ne "") {
            Write-Error "License key found in config.json!"
            exit 1
          }
          Write-Host "Config verified - no bundled license"

      - name: Build with PyInstaller
        run: pyinstaller spec/ZEMmacOS.spec --noconfirm

      - name: Build Installer with Inno Setup
        run: |
          choco install innosetup --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" config/installer.iss

      - name: Generate checksums
        run: |
          Get-ChildItem installer_output -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash *$($_.Name)" | Out-File -FilePath "$($_.FullName).sha256"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/*

  # ===== LINUX BUILD =====
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller spec/ZEMmacOS.spec --noconfirm

      - name: Build AppImage
        run: |
          # Install appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Prepare AppDir
          mkdir -p installer_output/appimage/ZEMmacOS.AppDir/usr/{bin,share/{applications,icons/hicolor/256x256/apps,ZEMmacOS}}
          cp -r dist/ZEMmacOS/* installer_output/appimage/ZEMmacOS.AppDir/usr/share/ZEMmacOS/
          ln -s ../share/ZEMmacOS/ZEMmacOS installer_output/appimage/ZEMmacOS.AppDir/usr/bin/ZEMmacOS

          # Create .desktop file
          cat > installer_output/appimage/ZEMmacOS.AppDir/zemmacos.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=ZEMmacOS
          Comment=macOS Download Manager
          Exec=ZEMmacOS
          Icon=zemmacos
          Terminal=false
          Categories=Utility;FileTransfer;Development;
          EOF

          # Create AppRun
          cat > installer_output/appimage/ZEMmacOS.AppDir/AppRun << 'RUNEOF'
          #!/bin/bash
          exec "$(dirname "$(readlink -f "$0")")/usr/bin/ZEMmacOS"
          RUNEOF
          chmod +x installer_output/appimage/ZEMmacOS.AppDir/AppRun

          # Copy icon
          cp public/images/logo.png installer_output/appimage/ZEMmacOS.AppDir/zemmacos.png

          # Build AppImage
          ./appimagetool-x86_64.AppImage installer_output/appimage/ZEMmacOS.AppDir

          mv ZEMmacOS*.AppImage installer_output/

      - name: Build .deb package
        run: |
          mkdir -p installer_output/deb/zemmacos_3.0.0_amd64/{DEBIAN,usr/{bin,share/{applications,icons/hicolor/256x256/apps,doc/zemmacos,ZEMmacOS}}}

          # Control file
          cat > installer_output/deb/zemmacos_3.0.0_amd64/DEBIAN/control << 'CONTROL'
          Package: zemmacos
          Version: 3.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: WebSmithDigital <support@websmithdigital.com>
          Description: ZEMmacOS - macOS Download Manager
           Download macOS installer files directly from Apple's servers.
          Homepage: https://www.websmithdigital.com
          CONTROL

          # Post-install
          echo '#!/bin/bash' > installer_output/deb/zemmacos_3.0.0_amd64/DEBIAN/postinst
          echo 'update-desktop-database 2>/dev/null || true' >> installer_output/deb/zemmacos_3.0.0_amd64/DEBIAN/postinst
          echo 'gtk-update-icon-cache -f /usr/share/icons/hicolor 2>/dev/null || true' >> installer_output/deb/zemmacos_3.0.0_amd64/DEBIAN/postinst
          chmod +x installer_output/deb/zemmacos_3.0.0_amd64/DEBIAN/postinst

          # Desktop file
          cp config/linux/ZEMmacOS.desktop installer_output/deb/zemmacos_3.0.0_amd64/usr/share/applications/zemmacos.desktop
          cp public/images/logo.png installer_output/deb/zemmacos_3.0.0_amd64/usr/share/icons/hicolor/256x256/apps/zemmacos.png
          cp -r dist/ZEMmacOS/* installer_output/deb/zemmacos_3.0.0_amd64/usr/share/ZEMmacOS/
          ln -s /usr/share/ZEMmacOS/ZEMmacOS installer_output/deb/zemmacos_3.0.0_amd64/usr/bin/zemmacos

          dpkg-deb --build installer_output/deb/zemmacos_3.0.0_amd64

      - name: Generate checksums
        run: |
          cd installer_output
          sha256sum *.AppImage *.deb > checksums.sha256 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            installer_output/*.AppImage
            installer_output/*.deb
            installer_output/*.sha256

  # ===== macOS BUILD =====
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app bundle
        run: |
          # Use direct PyInstaller with macOS options
          pyinstaller spec/ZEMmacOS.spec --noconfirm

      - name: Create DMG
        run: |
          mkdir -p installer_output
          hdiutil create -volname "ZEMmacOS 3.0.0" \
            -srcfolder dist/ZEMmacOS.app \
            -ov -format UDZO \
            installer_output/ZEMmacOS_v3.0.0.dmg

      - name: Create PKG
        run: |
          pkgbuild --root dist/ZEMmacOS.app \
            --identifier com.websmithdigital.zemmacos \
            --version 3.0.0 \
            --install-location /Applications/ZEMmacOS.app \
            installer_output/ZEMmacOS_v3.0.0.pkg

      - name: Generate checksums
        run: |
          cd installer_output
          shasum -a 256 *.dmg *.pkg > checksums.sha256 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            installer_output/*.dmg
            installer_output/*.pkg
            installer_output/*.sha256

  # ===== CREATE RELEASE =====
  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ZEMmacOS v${{ github.ref_name }}
          body_path: build/RELEASE_CHECKLIST.md
          files: |
            windows-installer/*
            linux-installers/*
            macos-installers/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
